name: Snapshot Command Help

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  issues: write
  pull-requests: read

jobs:
  post-snapshot-command-help:
    name: Post snapshot command help
    runs-on: ubuntu-latest

    steps:
      - name: Post or update command help comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- tscircuit-snapshot-command-help -->'
            const body = [
              marker,
              '## Snapshot Updates',
              '',
              'Maintainers can comment `/us` or `/update-snapshots` on this PR to update test snapshots.',
            ].join('\n')

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            })

            const existingComment = comments.find((comment) =>
              comment.body?.includes(marker)
            )

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              })
              return
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            })
